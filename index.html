<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clube Sirius - Missão Bíblica</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050a1a; font-family: 'Arial', sans-serif; }
        
        /* Interface Principal Amarela Sólida */
        #interface-jogo {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #ffff00;
            padding: 10px 20px;
            border: 3px solid #000;
            font-weight: bold;
            box-shadow: 4px 4px 0px #000;
            z-index: 10;
        }

        /* Caixa de Diálogo com o Desbravador e Imagem da Pergunta */
        #caixa-dialogo {
            display: none;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 700px;
            background: #ffff00;
            border: 4px solid #000;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 8px 8px 0px #000;
            z-index: 20;
        }

        .img-referencia {
            width: 120px;
            height: 120px;
            border: 3px solid #000;
            object-fit: cover;
            background: #fff;
        }

        .conteudo-texto { flex: 1; }
        
        input {
            padding: 10px;
            border: 2px solid #000;
            width: 90%;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            background: #000;
            color: #ffff00;
            border: none;
            padding: 12px 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background: #333; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="interface-jogo">CLUBE SIRIUS | NÍVEL: <span id="lvl">1</span></div>

    <div id="caixa-dialogo" style="display: none;">
        <img id="logo-pergunta" src="" class="img-referencia">
        
        <div class="conteudo-texto">
            <h3 id="titulo-astro" style="margin: 0 0 10px 0;"></h3>
            <p id="texto-missao"></p>
            <input type="text" id="input-resposta" placeholder="Sua resposta...">
            <br>
            <button onclick="verificarResposta()">AVANÇAR</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let nivel = 1;
        let missaoAtual = null;
        let estrelasFundo = [];

        // 5 Estrelas com Perguntas Bíblicas e Termos de Busca para Imagem
        const destinos = [
            { nome: "Estrela 1", x: 200, y: 400, busca: "bible-ark", pergunta: "Quem construiu a arca?", resposta: "Noe", concluida: false },
            { nome: "Estrela 2", x: 500, y: 200, busca: "david-goliath", pergunta: "Quem derrotou o gigante Golias?", resposta: "Davi", concluida: false },
            { nome: "Estrela 3", x: 800, y: 500, busca: "moses-sea", pergunta: "Quem abriu o Mar Vermelho?", resposta: "Moises", concluida: false },
            { nome: "Estrela 4", x: 1000, y: 200, busca: "lion-daniel", pergunta: "Quem foi jogado na cova dos leões?", resposta: "Daniel", concluida: false },
            { nome: "SIRIUS", x: canvas.width/2, y: canvas.height/2, busca: "jesus-cross", pergunta: "Quem é o caminho, a verdade e a vida?", resposta: "Jesus", concluida: false }
        ];

        const desbravador = {
            x: 50, y: canvas.height - 100,
            alvoX: 50, alvoY: canvas.height - 100,
            voando: false
        };

        // Criar estrelas animadas para o fundo
        for(let i=0; i<180; i++) {
            estrelasFundo.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, b: Math.random()});
        }

        function desenhar() {
            ctx.fillStyle = "#050a1a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            estrelasFundo.forEach(e => {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(Math.sin(Date.now()*0.001 + e.x))})`;
                ctx.fillRect(e.x, e.y, 2, 2);
            });

            destinos.forEach(d => {
                ctx.fillStyle = d.concluida ? "#ffff00" : "#ffffff33";
                ctx.beginPath();
                ctx.arc(d.x, d.y, 18, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.stroke();
                
                ctx.fillStyle = "#fff";
                ctx.font = "bold 12px Arial";
                ctx.fillText(d.nome, d.x - 30, d.y + 35);
            });

            if(desbravador.voando) {
                let dx = desbravador.alvoX - desbravador.x;
                let dy = desbravador.alvoY - desbravador.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist > 5) {
                    desbravador.x += dx/15;
                    desbravador.y += dy/15;
                } else {
                    desbravador.voando = false;
                    exibirMissao();
                }
            }

            // O Desbravador (Representado por um círculo amarelo brilhante)
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ffff00";
            ctx.fillStyle = "#ffff00";
            ctx.beginPath();
            ctx.arc(desbravador.x, desbravador.y, 12, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            requestAnimationFrame(desenhar);
        }

        canvas.addEventListener('click', (e) => {
            if(desbravador.voando) return;
            destinos.forEach(d => {
                let dist = Math.sqrt((e.clientX - d.x)**2 + (e.clientY - d.y)**2);
                if(dist < 40 && !d.concluida) {
                    missaoAtual = d;
                    desbravador.alvoX = d.x;
                    desbravador.alvoY = d.y;
                    desbravador.voando = true;
                }
            });
        });

        function exibirMissao() {
            // Pega uma imagem da web baseada no tema da pergunta
            document.getElementById('logo-pergunta').src = `https://source.unsplash.com/featured/?${missaoAtual.busca}`;
            document.getElementById('titulo-astro').innerText = missaoAtual.nome;
            document.getElementById('texto-missao').innerText = missaoAtual.pergunta;
            document.getElementById('caixa-dialogo').style.display = 'flex';
        }

        function verificarResposta() {
            let entrada = document.getElementById('input-resposta').value.trim();
            if(entrada.toLowerCase() === missaoAtual.resposta.toLowerCase()) {
                missaoAtual.concluida = true;
                nivel++;
                document.getElementById('lvl').innerText = nivel;
                document.getElementById('caixa-dialogo').style.display = 'none';
                document.getElementById('input-resposta').value = "";
                alert("Parabéns, Desbravador! Missão concluída.");
            } else {
                alert("Ops! Resposta incorreta. Tente novamente.");
            }
        }

        desenhar();
    </script>
</body>
</html>
