<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirius: O Desafio dos Herdeiros do Reino</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;600&display=swap');

        :root {
            --gold: #FFD700;
            --elite-blue: #00e5ff;
            --deep-blue: #020617;
            --panel-bg: rgba(2, 6, 23, 0.96);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Outfit', sans-serif; color: white;
        }

        /* --- BACKGROUND GALÁXIA --- */
        #galaxy-map {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1e3c 0%, #000 100%);
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1), filter 1s;
        }

        .star-nebula {
            position: absolute; border-radius: 50%; background: white;
            opacity: 0.4; animation: twinkle 3s infinite alternate;
        }

        /* --- O JOGADOR (SEU DESBRAVADORZINHO) --- */
        #pathfinder {
            position: absolute; width: 45px; height: 45px;
            bottom: 20px; left: 50%; transform: translateX(-50%);
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 500;
        }
        #pathfinder img { width: 100%; height: 100%; object-fit: contain; }

        /* --- ESTRELAS DE MISSÃO --- */
        .mission-star {
            position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .star-core { width: 12px; height: 12px; border-radius: 50%; background: #fff; box-shadow: 0 0 15px gold; }
        .star-label { font-family: 'Orbitron'; font-size: 9px; color: gold; margin-top: 5px; text-align: center; }

        /* --- VISÃO DE SUPERFÍCIE (PLANETA/ESTRELA) --- */
        #surface-view {
            position: absolute; inset: 0;
            background: linear-gradient(to top, #000 0%, #0c1a31 100%);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .horizon {
            position: absolute; bottom: 0; width: 150%; height: 35%;
            background: #050505; border-top: 4px solid #111;
            border-radius: 50% 50% 0 0; left: -25%;
        }

        #pouso-pf { position: absolute; bottom: 25%; transform: scale(1.8) translateX(-30%); z-index: 1100; width: 45px;}
        #pouso-pf img { width: 100%; object-fit: contain; }

        /* --- UI DE MISSÃO --- */
        #mission-panel {
            position: relative; width: 500px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 40px; border-radius: 24px;
            text-align: center; backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            z-index: 1200; transform: translateY(-30px);
        }

        #mission-panel h2 { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 4px; margin: 0 0 5px 0; }
        #mission-panel h4 { font-family: 'Outfit'; color: #475569; margin: 0 0 20px 0; font-weight: 300;}
        #mission-panel p { font-size: 1.1rem; color: #cbd5e1; line-height: 1.6; min-height: 80px; margin-bottom: 25px;}

        .loading-track {
            width: 100%; height: 8px; background: #0f172a; border-radius: 4px;
            margin: 20px 0; overflow: hidden; border: 1px solid #1e293b;
        }
        .loading-fill { width: 0%; height: 100%; background: var(--gold); transition: width 1s ease; box-shadow: 0 0 15px var(--gold); }

        .input-wrapper input {
            width: 85%; padding: 15px; background: #020617; border: 1px solid #334155;
            color: white; border-radius: 12px; font-size: 1.1rem; text-align: center;
            outline: none; transition: 0.3s;
        }
        .input-wrapper input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }

        .btn-boost {
            margin-top: 25px; width: 100%; padding: 18px;
            background: var(--gold); color: #000; font-family: 'Orbitron';
            font-weight: bold; border: none; border-radius: 12px;
            cursor: pointer; display: none; transition: 0.3s;
        }
        .btn-boost:hover { background: white; transform: scale(1.02); }

        #status-msg { margin-top: 15px; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; }

        /* --- MODO ELITE STYLES --- */
        .elite-mode #mission-panel { border-color: var(--elite-blue); }
        .elite-mode #mission-panel h2 { color: var(--elite-blue); }
        .elite-mode .loading-fill { background: var(--elite-blue); box-shadow: 0 0 15px var(--elite-blue); }
        .elite-mode .btn-boost { background: var(--elite-blue); }

        /* --- TELA FINAL (SUA IMAGEM DO ABENÇOADO) --- */
        #victory-screen {
            display: none; position: fixed; inset: 0; background: #000;
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
        }
        #victory-screen img { width: 90%; max-width: 650px; border-radius: 20px; border: 4px solid var(--gold); box-shadow: 0 0 60px rgba(255, 215, 0, 0.3); }

        @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.7; } }
    </style>
</head>
<body>

<div id="galaxy-map">
    </div>

<div id="pathfinder">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOFgk580o1WLxOw0uEojhqDeed76mmLPpXRw&s" alt="Pathfinder">
</div>

<div id="surface-view">
    <div class="horizon"></div>
    <div id="pouso-pf">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOFgk580o1WLxOw0uEojhqDeed76mmLPpXRw&s" alt="Pathfinder">
    </div>

    <div id="mission-panel">
        <h2 id="star-name">NOME DA ESTRELA</h2>
        <h4 id="star-mode">MODO JORNADA</h4>
        <p id="star-mission">Aguardando conexão estelar...</p>
        
        <div class="loading-track"><div class="loading-fill" id="progress"></div></div>
        
        <div class="input-wrapper">
            <input type="text" id="user-ans" placeholder="DIGITE A RESPOSTA..." autocomplete="off">
            <div id="status-msg"></div>
            <button class="btn-boost" id="btn-up" onclick="takeOff()">SUBIR PARA A PRÓXIMA ↑</button>
        </div>
    </div>
</div>
