<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRIUS: O Desafio dos Herdeiros</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700; /* Amarelo sólido solicitado */
            --bg-dark: #02060B;
            --accent: #1a2a4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

        /* Background Profissional */
        #space-background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #050a14, #02060b);
            z-index: 1;
        }

        .bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Airbrush-IMAGE-ENHANCER-1772282903019-1772282903019 (1).jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: 2;
        }

        /* Personagem Desbravador Animado */
        #player {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 2.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10;
            display: none;
            text-align: center;
        }

        #player img {
            width: 70px;
            filter: drop-shadow(0 0 10px var(--primary));
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* HUD - Interface de Missão */
        #hud-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 550px;
            background: rgba(13, 20, 36, 0.95);
            border: 2px solid var(--primary);
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .logo-hud { width: 100px; margin-bottom: 20px; }
        
        h2 { font-family: 'Orbitron', sans-serif; color: var(--primary); letter-spacing: 5px; margin-bottom: 20px; }
        
        .mission-text { font-size: 1.4rem; margin-bottom: 30px; color: #E2E8F0; min-height: 100px; }

        .btn-game {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.3s;
        }

        .btn-game:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4); }
