<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sirius: Desafio Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap');

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #010307; 
            font-family: 'Roboto', sans-serif; color: white;
        }

        #game-viewport {
            position: relative; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1b33 0%, #010307 100%);
            transition: opacity 0.8s;
        }

        /* O Desbravador (Mapa) */
        #pathfinder {
            position: absolute; width: 35px; height: 50px;
            bottom: 20px; left: 50%; transform: translateX(-50%);
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .pf-visual { width: 100%; height: 100%; background: #111; border-radius: 5px; position: relative; border: 1px solid #333; }
        .pf-scarf { position: absolute; top: 12px; width: 100%; height: 12px; background: #FFD700; }

        /* Estrelas no Mapa */
        .map-star {
            position: absolute; width: 15px; height: 15px;
            background: #fff; border-radius: 50%;
            box-shadow: 0 0 15px 2px #fff;
        }
        .map-label { position: absolute; top: 20px; width: 100px; left: -40px; text-align: center; font-family: 'Orbitron'; font-size: 9px; color: gold; }

        /* Visão de Superfície */
        #star-view {
            position: absolute; inset: 0;
            background: linear-gradient(to top, #000 0%, #0a1b33 100%);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200;
        }

        .ground {
            position: absolute; bottom: 0; width: 100%; height: 30%;
            background: #050505; border-top: 2px solid #111;
        }

        /* Interface de Missão */
        #mission-card {
            background: rgba(10, 20, 40, 0.9);
            border: 1px solid gold; padding: 40px;
            border-radius: 15px; width: 450px;
            text-align: center; z-index: 300;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        h2 { font-family: 'Orbitron'; color: gold; letter-spacing: 2px; }
        p { font-size: 18px; line-height: 1.5; margin-bottom: 25px; }

        .loading-container { width: 100%; height: 12px; background: #111; border-radius: 6px; margin-bottom: 20px; border: 1px solid #333; }
        .bar { width: 0%; height: 100%; background: #FFD700; transition: width 1s; box-shadow: 0 0 10px gold; }
