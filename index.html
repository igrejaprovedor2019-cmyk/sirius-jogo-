<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clube Sirius | Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700; /* Amarelo Sólido */
            --bg-dark: #050A14; /* Azul Profundo */
            --bg-card: #0D1424;
            --text-light: #FFFFFF;
            --text-muted: #A0AEC0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header / Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 10%;
            background: rgba(5, 10, 20, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-text {
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: -1px;
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            background: radial-gradient(circle at center, #1a2a4a 0%, var(--bg-dark) 70%);
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .hero h1 span {
            color: var(--primary);
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 2rem;
        }

        /* Call to Action */
        .btn {
            background-color: var(--primary);
            color: var(--bg-dark);
            padding: 1rem 2.5rem;
            border-radius: 4px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }

        /* Section Mission */
        .section {
            padding: 5rem 10%;
            text-align: center;
        }

        .card {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 12px;
            border-top: 4px solid var(--primary);
            display: inline-block;
            max-width: 800px;
        }

        .quote {
            font-size: 1.5rem;
            font-style: italic;
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        .author {
            color: var(--primary);
            font-weight: 700;
            display: block;
        }

        footer {
            padding: 3rem;
            text-align: center;
            border-top: 1px solid #1a2a4a;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-text">SIRIUS.</div>
        <div>
            <a href="#" class="btn" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Entrar</a>
        </div>
    </nav>

    <header class="hero">
        <h1>CLUBE <span>SIRIUS</span></h1>
        <p>Excelência em identidade visual e desenvolvimento de sistemas de alta performance.</p>
        <a href="#sobre" class="btn">Saiba Mais</a>
    </header>

    <section class="section" id="sobre">
        <div class="card">
            <p class="quote">"Os que ensinam com justiça brilharão como as estrelas para todo o sempre."</p>
            <span class="author">DANIEL 12:3</span>
        </div>
    </section>

    <footer>
        &copy; 2026 Clube Sirius. Design e Tecnologia de alto nível.
    </footer>

</body>
</html>
