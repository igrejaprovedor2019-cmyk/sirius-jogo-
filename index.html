<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRIUS: A Ascensão do Herdeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700; /* Amarelo sólido solicitado */
            --bg-deep: #02060B;
            --accent: #1a2a4a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            background: var(--bg-deep);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        /* Fundo de Estrelas Dinâmico */
        #game-canvas {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to top, #050a14, #02060b);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Imagem de Fundo (Wallpaper enviado) */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('Airbrush-IMAGE-ENHANCER-1772282903019-1772282903019 (1).jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.2;
            z-index: 1;
        }

        /* Personagem Desbravador */
        #desbravador {
            position: absolute;
            bottom: 50px;
            width: 80px;
            transition: all 2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            z-index: 10;
            display: none;
            text-align: center;
        }

        .lenco-amarelo {
            width: 30px;
            height: 12px;
            background: var(--primary);
            margin: -10px auto 0;
            border-radius: 0 0 5px 5px;
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.5);
        }

        /* Interface de Missão Estilo HUD */
        #hud {
            position: relative;
            background: rgba(10, 20, 40, 0.9);
            border: 2px solid var(--primary);
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .logo-small {
            width: 120px;
            margin-bottom: 20px;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        .mission-box {
            font-size: 1.3rem;
            margin-bottom: 30px;
            line-height: 1.6;
            min-height: 80px;
        }

        .btn-action {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px 45px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.3s;
        }

        .btn-action:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--primary);
        }

        /* Estrelas no Caminho */
        .star {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            filter: blur(2px);
            box-shadow: 0 0 20px #fff;
            opacity: 0.3;
        }

        .active-target {
            opacity: 1;
            background: var(--primary);
            box-shadow: 0 0 40px var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        #final-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-canvas">
    <div class="bg-overlay"></div>
    
    <div id="desbravador">
        <img src="image_8593e0.jpg" style="width: 60px;" alt="Hero">
        <div class="lenco-amarelo"></div>
    </div>

    <div id="hud">
        <img src="image_852765.png" alt="Sirius Logo" class="logo-small">
        <h2 id="current-star">Terra</h2>
        <div class="mission-box" id="text-display">
            Bem-vindo ao Clube Sirius. Sua missão é levar a mensagem de justiça através das estrelas. Prepare-se para o lançamento.
        </div>
        <button class="btn-action" onclick="handleInput()" id="btn-text">Iniciar Lançamento</button>
    </div>
</div>

<div id="final-screen">
    <h1 style="color: var(--primary); font-size: 4rem; font-family: 'Orbitron';">BÊNÇÃO ALCANÇADA</h1>
    <p style="font-size: 1.5rem; margin: 20px 0;">Você completou tudo e foi abençoado(a)!</p>
    <img src="Airbrush-IMAGE-ENHANCER-1772282903019-1772282903019 (1).jpg" style="max-width: 80%; border: 4px solid var(--primary); border-radius: 10px;">
    <p style="margin-top: 20px; font-style: italic;">"Os que ensinam com justiça brilharão como as estrelas." - Daniel 12:3</p>
</div>

<script>
    const stars = [
        { name: "Andrômeda", mission: "O Desbravador deve brilhar. Qual é o lema do nosso clube para esta jornada?", btn: "Subir para Andrômeda", y: "25%" },
        { name: "Pegasus", mission: "A coragem é nossa marca. Como você ajuda seu próximo no Clube Sirius?", btn: "Subir para Pegasus", y: "45%" },
        { name: "Cruzeiro", mission: "Norteados pela fé. Qual é a estrela que guia o nosso caminho?", btn: "Subir para Cruzeiro", y: "65%" },
        { name: "Centauro", mission: "Força e Honra. Como você mantém seu lenço amarelo sempre impecável?", btn: "Subir para Centauro", y: "80%" },
        { name: "SIRIUS", mission: "A Estrela Final. Você cumpriu todos os requisitos e honrou o lenço. Receba sua recompensa.", btn: "Receber Bênção", y: "92%" }
    ];

    let step = -1;

    function handleInput() {
        step++;
        const hero = document.getElementById('desbravador');
        const starTitle = document.getElementById('current-star');
        const text = document.getElementById('text-display');
        const btn = document.getElementById('btn-text');

        if (step === 0) {
            hero.style.display = 'block';
        }

        if (step < stars.length) {
            // Movimentação
            hero.style.bottom = stars[step].y;
            
            // Atualização de UI
            starTitle.innerText = stars[step].name;
            text.innerText = stars[step].mission;
            btn.innerText = stars[step].btn;

            // Efeito visual
            document.getElementById('hud').style.borderColor = "#fff";
            setTimeout(() => { document.getElementById('hud').style.borderColor = "var(--primary)"; }, 500);

        } else {
            // FIM DO JOGO
            document.getElementById('final-screen').style.display = 'flex';
        }
    }
</script>

</body>
</html>
