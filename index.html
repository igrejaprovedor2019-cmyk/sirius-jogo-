<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRIUS | Official Game Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700; /* Amarelo sólido */
            --accent: #00D1FF;
            --bg: #02060B;
            --surface: #0A121E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0d1b2a 0%, #02060b 100%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .logo-container {
            position: relative;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        h1 span { color: var(--primary); }

        .tagline {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary);
            margin-bottom: 3rem;
        }

        .cta-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 2px;
            transition: 0.3s;
            position: relative;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px var(--primary);
            transform: scale(1.05);
        }

        .verse-section {
            background: var(--surface);
            padding: 60px 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            text-align: center;
        }

        .quote {
            max-width: 700px;
            margin: 0 auto;
            font-size: 1.4rem;
            font-style: italic;
            opacity: 0.8;
        }

        .ref {
            display: block;
            margin-top: 15px;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>SIRI<span>US</span></h1>
        </div>
        <p class="tagline">O Desafio dos Herdeiros</p>
        
        <div class="cta-group">
            <a href="#" class="btn btn-primary">Jogar Agora</a>
        </div>
    </header>

    <section class="verse-section">
        <p class="quote">"Os que ensinam com justiça brilharão como as estrelas para todo o sempre."</p>
        <span class="ref">DANIEL 12:3</span>
    </section>

</body>
</html>
