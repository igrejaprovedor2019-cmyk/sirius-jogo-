<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clube Sirius - Missão Espacial</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; cursor: crosshair; }
        
        /* Interface no estilo Amarelo Sólido que você pediu */
        #ui-camada {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #ffff00; /* Amarelo sem transparência */
            padding: 15px;
            border: 2px solid #000;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #000;
        }

        #missao-status {
            margin-top: 5px;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="ui-camada">
        <div>Clube Sirius - Comandante</div>
        <div id="missao-status">Status: Aguardando Destino</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- CONFIGURAÇÕES ---
        let estrelasDeFundo = [];
        let nivel = 1;
        
        const missoes = [
            { nome: "Sirius", x: canvas.width * 0.2, y: canvas.height * 0.2, completada: false, pergunta: "Qual a estrela mais brilhante do céu noturno?", resposta: "Sirius" },
            { nome: "Andromeda", x: canvas.width * 0.7, y: canvas.height * 0.4, completada: false, pergunta: "Andromeda é uma galáxia ou um planeta?", resposta: "Galáxia" },
            { nome: "Pegasus", x: canvas.width * 0.4, y: canvas.height * 0.8, completada: false, pergunta: "Em qual constelação está a estrela 51 Pegasi?", resposta: "Pegaso" }
        ];

        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            tamanho: 40,
            alvo: null,
            velocidade: 5
        };

        // --- LÓGICA DO CENÁRIO (ESTRELAS PISCANDO) ---
        function criarEstrelas() {
            for (let i = 0; i < 200; i++) {
                estrelasDeFundo.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    tam: Math.random() * 2,
                    brilho: Math.random(),
                    velBrilho: 0.01 + Math.random() * 0.03
                });
            }
        }

        function desenharEspaco() {
            ctx.fillStyle = '#050a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            estrelasDeFundo.forEach(e => {
                ctx.fillStyle = `rgba(255, 255, 255, ${e.brilho})`;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.tam, 0, Math.PI * 2);
                ctx.fill();

                e.brilho += e.velBrilho;
                if (e.brilho > 1 || e.brilho < 0.2) e.velBrilho *= -1;
            });

            // Desenhar Destinos
            missoes.forEach(m => {
                ctx.fillStyle = m.completada ? "#ffff00" : "#ffffff";
                ctx.beginPath();
                ctx.arc(m.x, m.y, 8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.font = "12px Arial";
                ctx.fillText(m.nome.toUpperCase(), m.x - 25, m.y - 15);
            });
        }

        // --- LÓGICA DE MOVIMENTO E MISSÃO ---
        function atualizarPlayer() {
            if (player.alvo) {
                const dx = player.alvo.x - player.x;
                const dy = player.alvo.y - player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 5) {
                    player.x += (dx / dist) * player.velocidade;
                    player.y += (dy / dist) * player.velocidade;
                } else {
                    const alvoAtual = player.alvo;
                    player.alvo = null;
                    iniciarMissao(alvoAtual);
                }
            }
        }

        function iniciarMissao(astro) {
            if (astro.completada) return;
            
            const resp = prompt(`MISSÃO EM ${astro.nome.toUpperCase()}\n\n${astro.pergunta}`);
            if (resp && resp.toLowerCase() === astro.resposta.toLowerCase()) {
                alert("SUCESSO! Você conquistou o sistema " + astro.nome);
                astro.completada = true;
                nivel++;
                document.getElementById('missao-status').innerText = `Status: Nível ${nivel} Alcançado`;
            } else {
                alert("ERRO DE NAVEGAÇÃO! Resposta incorreta.");
            }
        }

        canvas.addEventListener('click', (e) => {
            missoes.forEach(m => {
                const d = Math.sqrt((e.clientX - m.x)**2 + (e.clientY - m.y)**2);
                if (d < 30) {
                    player.alvo = m;
                    document.getElementById('missao-status').innerText = `Viajando para: ${m.nome}`;
                }
            });
        });

        // --- LOOP PRINCIPAL ---
        function gameLoop() {
            desenharEspaco();
            
            // Personagem (Representado por um triângulo amarelo até você colocar sua imagem)
            ctx.fillStyle = "#ffff00";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 20);
            ctx.lineTo(player.x - 15, player.y + 15);
            ctx.lineTo(player.x + 15, player.y + 15);
            ctx.fill();

            atualizarPlayer();
            requestAnimationFrame(gameLoop);
        }

        criarEstrelas();
        gameLoop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
